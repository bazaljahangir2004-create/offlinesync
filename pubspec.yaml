name: offlinesync
description: "Offline-first field data collection app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

    

  # State management
  flutter_riverpod: ^2.5.1

   

  # Local database (offline storage)
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.3
  path: ^1.9.0

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.0.1

  # Connectivity detection
  connectivity_plus: ^6.0.3

  # GPS location
  geolocator: ^13.0.1

  # Camera / image picking
  image_picker: ^1.1.2

  # Cloudinary upload (image storage)
  http: ^1.2.1

  # UUID generation for local-to-cloud ID mapping
  uuid: ^4.4.0

  # Icons
  cupertino_icons: ^1.0.6

  # Date formatting
  intl: ^0.19.0

  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.20.2
  build_runner: ^2.4.11
  analyzer: ^7.0.0
  
   
 

flutter:
  uses-material-design: true